services:
  mysql-dev:
    image: mysql:8.0
    container_name: kuberone-dev-mysql
    restart: unless-stopped
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
      MYSQL_DATABASE: kuberone_dev
    ports:
      - '3306:3306'
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - kuberone_dev_mysql_data:/var/lib/mysql

volumes:
  kuberone_dev_mysql_data:
