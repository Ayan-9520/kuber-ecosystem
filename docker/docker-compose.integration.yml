services:
  mysql-integration:
    image: mysql:8.0
    container_name: kuberone-integration-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: integration
      MYSQL_DATABASE: kuberone_integration_test
    ports:
      - '3307:3306'
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - kuberone_integration_mysql_data:/var/lib/mysql

volumes:
  kuberone_integration_mysql_data:
