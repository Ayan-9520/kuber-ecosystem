name: CI — Admin

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/admin/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/admin/**'
      - 'packages/**'

jobs:
  admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build --filter=@kuberone/admin...

      - run: pnpm --filter @kuberone/admin typecheck

      - run: pnpm --filter @kuberone/admin lint

      - run: pnpm --filter @kuberone/admin test
