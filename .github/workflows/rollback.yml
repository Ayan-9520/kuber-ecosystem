name: Rollback Pipeline

on:
  workflow_dispatch:
    inputs:
      component:
        description: Component to rollback
        required: true
        type: choice
        options:
          - backend
          - admin
          - worker
          - monitoring
          - all
      target_version:
        description: Target version/tag (e.g. v1.0.0)
        required: true
      environment:
        description: Environment
        required: true
        default: production
        type: choice
        options:
          - staging
          - production
      auto_rollback:
        description: Automatic rollback on health check failure
        type: boolean
        default: false

jobs:
  rollback:
    name: Execute Rollback
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Rollback ${{ inputs.component }} → ${{ inputs.target_version }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/kuberone
            bash deployment/scripts/rollback.sh "${{ inputs.component }}" "${{ inputs.target_version }}" "${{ inputs.environment }}"

      - name: Health check
        run: |
          URL="${{ secrets.PRODUCTION_HEALTH_URL || 'https://api.kuberone.in' }}/health/live"
          for i in 1 2 3 4 5; do
            curl -sf "$URL" && exit 0
            sleep 10
          done
          if [ "${{ inputs.auto_rollback }}" = "true" ]; then
            echo "Health check failed — automatic rollback triggered"
            exit 1
          fi
          exit 1

      - name: Record rollback
        if: always()
        run: |
          node scripts/ci-record-pipeline.mjs --type ROLLBACK --name "Rollback ${{ inputs.component }} to ${{ inputs.target_version }}" --status ${{ job.status == 'success' && 'SUCCESS' || 'FAILED' }} --branch ${{ inputs.environment }}
        env:
          DEVOPS_API_URL: ${{ secrets.DEVOPS_API_URL }}
          DEVOPS_WEBHOOK_SECRET: ${{ secrets.DEVOPS_WEBHOOK_SECRET }}
