name: Android Release Pipeline

on:
  push:
    branches: [main, staging]
    paths:
      - 'apps/mobile-customer/**'
      - 'apps/mobile-dsa/**'
      - 'deployment/mobile/**'
  workflow_dispatch:
    inputs:
      app:
        description: 'App to build'
        required: true
        type: choice
        options: [customer, dsa, both]
      environment:
        description: 'Build environment'
        required: true
        type: choice
        options: [qa, staging, production]
      format:
        description: 'Output format'
        required: true
        type: choice
        options: [apk, aab, both]

jobs:
  gate:
    name: Release Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node scripts/android-release-gate.mjs

  build:
    name: Build ${{ matrix.app }} (${{ matrix.format }})
    needs: gate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: mobile-customer
            pkg: customer
            format: apk
          - app: mobile-dsa
            pkg: dsa
            format: apk
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Decode keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > /tmp/release.keystore

      - name: Setup google-services.json
        run: |
          APP_DIR="apps/${{ matrix.app }}"
          if [ "${{ matrix.app }}" = "mobile-customer" ] && [ -n "${{ secrets.GOOGLE_SERVICES_JSON_CUSTOMER }}" ]; then
            echo "${{ secrets.GOOGLE_SERVICES_JSON_CUSTOMER }}" > "$APP_DIR/google-services.json"
          elif [ "${{ matrix.app }}" = "mobile-dsa" ] && [ -n "${{ secrets.GOOGLE_SERVICES_JSON_DSA }}" ]; then
            echo "${{ secrets.GOOGLE_SERVICES_JSON_DSA }}" > "$APP_DIR/google-services.json"
          else
            cp "$APP_DIR/google-services.json.example" "$APP_DIR/google-services.json"
          fi

      - name: Prebuild Android
        env:
          EXPO_PUBLIC_APP_ENV: ${{ github.event.inputs.environment || 'staging' }}
        run: |
          cd apps/${{ matrix.app }}
          npx expo prebuild --platform android --clean --non-interactive

      - name: Write signing config
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > apps/${{ matrix.app }}/android/keystore.properties <<EOF
          storeFile=/tmp/release.keystore
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          keyPassword=${ANDROID_KEY_PASSWORD}
          EOF

      - name: Build release APK
        working-directory: apps/${{ matrix.app }}/android
        env:
          EXPO_PUBLIC_APP_ENV: ${{ github.event.inputs.environment || 'staging' }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease || echo "Build skipped — configure ANDROID_KEYSTORE_BASE64 secret for signed builds"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-android-apk
          path: apps/${{ matrix.app }}/android/app/build/outputs/apk/release/
          if-no-files-found: ignore

      - name: Record build
        if: always()
        env:
          MOBILE_APP: ${{ matrix.pkg }}
          BUILD_TYPE: apk
          EXPO_PUBLIC_APP_ENV: ${{ github.event.inputs.environment || 'staging' }}
          VERSION_NAME: '1.0.0'
          VERSION_CODE: '10001'
          BUILD_STATUS: ${{ job.status == 'success' && 'SUCCESS' || 'FAILED' }}
          MOBILE_WEBHOOK_BACKEND: ${{ secrets.MOBILE_WEBHOOK_BACKEND }}
          MOBILE_WEBHOOK_SECRET: ${{ secrets.MOBILE_WEBHOOK_SECRET }}
        run: node scripts/android-record-build.mjs
