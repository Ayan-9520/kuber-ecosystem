name: DR Validation

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 0'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node scripts/dr-gate.mjs
      - run: node scripts/dr-readiness-report.mjs
      - name: Backup validation gate
        run: node scripts/production-go-live-gate.mjs || true
