name: CI — Backend

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/backend/**'
      - 'packages/**'
      - 'database/**'
      - 'pnpm-lock.yaml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/backend/**'
      - 'packages/**'
      - 'database/**'

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm db:generate

      - run: pnpm build --filter=@kuberone/backend...

      - run: pnpm --filter @kuberone/backend typecheck

      - run: pnpm --filter @kuberone/backend lint

      - run: pnpm build --filter=@kuberone/test-utils

      - run: pnpm --filter @kuberone/backend test
        env:
          NODE_ENV: test
          APP_ENV: testing
          DATABASE_URL: mysql://root:root@localhost:3306/kuberone_test
          JWT_ACCESS_SECRET: test-access-secret-minimum-32-characters
          JWT_REFRESH_SECRET: test-refresh-secret-minimum-32-characters

      - run: pnpm --filter @kuberone/backend test:coverage
        env:
          NODE_ENV: test
          APP_ENV: testing
          DATABASE_URL: mysql://root:root@localhost:3306/kuberone_test
          JWT_ACCESS_SECRET: test-access-secret-minimum-32-characters
          JWT_REFRESH_SECRET: test-refresh-secret-minimum-32-characters

      - name: Error tracking deployment gate
        run: node scripts/error-deployment-gate.mjs
        env:
          DATABASE_URL: mysql://root:root@localhost:3306/kuberone_test
          ERROR_GATE_MAX_CRITICAL: 5
        continue-on-error: false

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: kuberone_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
