name: CI — Mobile Customer

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/mobile-customer/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/mobile-customer/**'
      - 'packages/**'

jobs:
  mobile-customer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @kuberone/mobile-customer typecheck

      - run: pnpm --filter @kuberone/mobile-customer lint
