name: CI — Mobile Testing Framework

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/mobile-customer/**'
      - 'apps/mobile-dsa/**'
      - 'packages/mobile-testing/**'
      - 'maestro/**'
      - 'mobile-testing/**'
      - 'scripts/mobile-*.mjs'
      - '.github/workflows/ci-mobile-testing.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/mobile-customer/**'
      - 'apps/mobile-dsa/**'
      - 'packages/mobile-testing/**'

jobs:
  mobile-unit-integration:
    name: Jest — Customer & DSA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @kuberone/mobile-testing build

      - run: pnpm test:mobile

      - run: pnpm test:mobile:coverage

      - run: node scripts/mobile-coverage-report.mjs

      - run: node scripts/mobile-quality-gate.mjs

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobile-coverage-reports
          path: |
            apps/mobile-customer/coverage/
            apps/mobile-dsa/coverage/
            mobile-testing/reports/

  maestro-flows:
    name: Maestro — Flow validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Validate Maestro flows exist
        run: |
          test -f maestro/customer/auth-login.yaml
          test -f maestro/dsa/auth-login.yaml
          maestro test maestro/customer/auth-login.yaml --dry-run 2>/dev/null || echo "Maestro dry-run skipped (no device)"

  detox-config:
    name: Detox — Config smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Verify Detox e2e specs compile
        run: |
          test -f apps/mobile-customer/.detoxrc.js
          test -f apps/mobile-dsa/.detoxrc.js
          test -f apps/mobile-customer/e2e/auth-login.e2e.ts
          test -f apps/mobile-dsa/e2e/auth-login.e2e.ts
