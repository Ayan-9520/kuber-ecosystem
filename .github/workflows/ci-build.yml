name: Build Pipeline

on:
  push:
    branches: [main, staging, develop, 'release/**', 'hotfix/**']
  workflow_dispatch:

env:
  REGISTRY_GHCR: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/kuberone

jobs:
  build-packages:
    name: Build Monorepo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @kuberone/database generate
      - run: pnpm build
      - uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            apps/backend/dist
            apps/admin/dist
            packages/*/dist

  docker-backend:
    name: Docker — Backend
    needs: build-packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deployment/docker/backend/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging' }}
          tags: |
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_PREFIX }}-backend:latest
          # Docker Hub ready: docker.io/${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}
          # ECR ready: ${{ secrets.AWS_ECR_REGISTRY }}/kuberone-backend:${{ github.sha }}

  docker-admin:
    name: Docker — Admin
    needs: build-packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deployment/docker/admin/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging' }}
          tags: |
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_PREFIX }}-admin:${{ github.sha }}
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_PREFIX }}-admin:latest

  docker-worker:
    name: Docker — Worker
    needs: build-packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deployment/docker/worker/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging' }}
          tags: |
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_PREFIX }}-worker:${{ github.sha }}
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_PREFIX }}-worker:latest

  record-build:
    name: Record Build
    needs: [build-packages, docker-backend, docker-admin, docker-worker]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node scripts/ci-record-pipeline.mjs --type BUILD --name "Build ${{ github.ref_name }}" --status ${{ needs.build-packages.result == 'success' && 'SUCCESS' || 'FAILED' }} --branch ${{ github.ref_name }}
        env:
          DEVOPS_API_URL: ${{ secrets.DEVOPS_API_URL }}
          DEVOPS_WEBHOOK_SECRET: ${{ secrets.DEVOPS_WEBHOOK_SECRET }}
