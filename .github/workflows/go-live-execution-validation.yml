name: Go-Live Execution Validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/backend/src/modules/go-live/**'
      - 'apps/admin/src/features/go-live/**'
      - 'database/prisma/schema/go-live*.prisma'
      - 'deployment/go-live/**'
      - 'scripts/go-live-execution-*.mjs'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @kuberone/shared-validation build
      - run: pnpm typecheck
      - run: node scripts/go-live-execution-gate.mjs
      - run: node scripts/go-live-execution-report.mjs
