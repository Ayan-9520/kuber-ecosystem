name: Play Store Release Pipeline

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'App'
        type: choice
        options: [customer, dsa, both]
      track:
        description: 'Release track'
        type: choice
        options: [internal, closed, open, production]
      rollout_percent:
        description: 'Staged rollout % (production only)'
        type: choice
        options: ['10', '25', '50', '100']
  push:
    tags:
      - 'play-store-v*'

jobs:
  gate:
    name: Play Store Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node scripts/play-store-release-gate.mjs
      - run: node scripts/play-store-readiness-report.mjs

  approval:
    name: Release Approval
    needs: gate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: echo "Play Store release approved for ${{ github.event.inputs.app || 'both' }}"

  submit:
    name: Submit to Play Store — ${{ matrix.app }}
    needs: approval
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [mobile-customer, mobile-dsa]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: pnpm install --frozen-lockfile

      - name: Decode Play service account
        if: env.PLAY_STORE_SERVICE_ACCOUNT != ''
        env:
          PLAY_STORE_SERVICE_ACCOUNT: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT }}
        run: |
          echo "$PLAY_STORE_SERVICE_ACCOUNT" > apps/${{ matrix.app }}/play-store-service-account.json

      - name: EAS Submit to Play Store
        working-directory: apps/${{ matrix.app }}
        env:
          EXPO_PUBLIC_APP_ENV: production
        run: |
          TRACK="${{ github.event.inputs.track || 'internal' }}"
          eas submit --platform android --profile production --non-interactive --latest || echo "Requires EXPO_TOKEN and service account"

      - name: Record Play Store release
        if: always()
        env:
          MOBILE_APP: ${{ matrix.app == 'mobile-customer' && 'customer' || 'dsa' }}
          PLAY_STORE_WEBHOOK_BACKEND: ${{ secrets.MOBILE_WEBHOOK_BACKEND }}
          PLAY_STORE_WEBHOOK_SECRET: ${{ secrets.PLAY_STORE_WEBHOOK_SECRET || secrets.MOBILE_WEBHOOK_SECRET }}
        run: |
          node -e "
          const payload = {
            app: process.env.MOBILE_APP,
            versionName: '1.0.0',
            versionCode: 10000,
            track: '${{ github.event.inputs.track || 'internal' }}',
            status: '${{ job.status }}' === 'success' ? 'IN_REVIEW' : 'DRAFT',
            commitSha: '${{ github.sha }}'
          };
          fetch((process.env.PLAY_STORE_WEBHOOK_BACKEND || '') + '/api/v1/play-store/webhook', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'x-play-store-webhook-secret': process.env.PLAY_STORE_WEBHOOK_SECRET || ''
            },
            body: JSON.stringify(payload)
          }).catch(() => {});
          "
