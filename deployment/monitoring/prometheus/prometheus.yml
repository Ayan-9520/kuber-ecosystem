global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: kuberone
    env: production

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: kuberone-backend
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ['host.docker.internal:4000']
        labels:
          service: kuberone-api
          component: backend

  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          component: infrastructure

  - job_name: mysql-exporter
    static_configs:
      - targets: ['mysql-exporter:9104']
        labels:
          component: database

  - job_name: redis-exporter
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          component: cache

  - job_name: kuberone-health
    metrics_path: /health/ready
    scrape_interval: 30s
    static_configs:
      - targets: ['host.docker.internal:4000']
        labels:
          probe: readiness
