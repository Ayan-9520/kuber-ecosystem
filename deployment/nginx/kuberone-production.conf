# KuberOne Production Nginx — api / admin / customer / partner
# SSL: AWS ACM at ALB + optional Let's Encrypt on origin
# Place in http {} block of nginx.conf:
#   limit_req_zone $binary_remote_addr zone=api_limit:20m rate=50r/s;
#   limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

upstream kuberone_api {
    least_conn;
    server api:4000 max_fails=3 fail_timeout=30s;
    keepalive 64;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── API: api.kuberone.com ──
server {
    listen 80;
    server_name api.kuberone.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.kuberone.com;

    ssl_certificate     /etc/nginx/ssl/api.kuberone.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/api.kuberone.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-XSS-Protection "1; mode=block" always;

    client_max_body_size 25M;
    gzip on;
    gzip_types application/json application/javascript text/css text/plain;

    location /health {
        proxy_pass http://kuberone_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    location /metrics {
        allow 10.0.0.0/8;
        deny all;
        proxy_pass http://kuberone_api;
    }

    location /api/ {
        limit_req zone=api_limit burst=100 nodelay;
        proxy_pass http://kuberone_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── Admin CRM: admin.kuberone.com ──
server {
    listen 80;
    server_name admin.kuberone.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name admin.kuberone.com;

    ssl_certificate     /etc/nginx/ssl/admin.kuberone.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/admin.kuberone.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://api.kuberone.com;" always;

    root /usr/share/nginx/html/admin;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://kuberone_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# ── Customer App: customer.kuberone.com ──
server {
    listen 80;
    server_name customer.kuberone.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name customer.kuberone.com;

    ssl_certificate     /etc/nginx/ssl/customer.kuberone.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/customer.kuberone.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        return 302 https://apps.apple.com/app/kuberone-customer;
    }

    location /api/ {
        proxy_pass http://kuberone_api;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── Partner/DSA App: partner.kuberone.com ──
server {
    listen 80;
    server_name partner.kuberone.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name partner.kuberone.com;

    ssl_certificate     /etc/nginx/ssl/partner.kuberone.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/partner.kuberone.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        return 302 https://play.google.com/store/apps/details?id=com.kuberfinserve.kuberone.dsa;
    }

    location /api/ {
        proxy_pass http://kuberone_api;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
