upstream kuberone_api {
    least_conn;
    server 127.0.0.1:4000;
    keepalive 32;
}

server {
    listen 80;
    server_name api.kuberone.kuberfinserve.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.kuberone.kuberfinserve.com;

    ssl_certificate     /etc/letsencrypt/live/api.kuberone.kuberfinserve.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.kuberone.kuberfinserve.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 25M;

    location /health {
        proxy_pass http://kuberone_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /api/ {
        proxy_pass http://kuberone_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}

server {
    listen 80;
    server_name admin.kuberone.kuberfinserve.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name admin.kuberone.kuberfinserve.com;

    ssl_certificate     /etc/letsencrypt/live/admin.kuberone.kuberfinserve.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.kuberone.kuberfinserve.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root /opt/kuberone/apps/admin/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://kuberone_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
