# KuberOne Staging Nginx — mirrors production with staging domains

upstream kuberone_staging_api {
    least_conn;
    server 127.0.0.1:4000;
    keepalive 32;
}

# staging-api.kuberone.com
server {
    listen 80;
    server_name staging-api.kuberone.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name staging-api.kuberone.com;

    ssl_certificate     /etc/letsencrypt/live/staging-api.kuberone.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging-api.kuberone.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Environment "staging" always;

    client_max_body_size 25M;
    gzip on;

    location /health { proxy_pass http://kuberone_staging_api; access_log off; }
    location /health/live { proxy_pass http://kuberone_staging_api; access_log off; }
    location /health/ready { proxy_pass http://kuberone_staging_api; access_log off; }

    location /api/ {
        proxy_pass http://kuberone_staging_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# staging-admin.kuberone.com
server {
    listen 80;
    server_name staging-admin.kuberone.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name staging-admin.kuberone.com;

    ssl_certificate     /etc/letsencrypt/live/staging-admin.kuberone.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging-admin.kuberone.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    add_header X-Environment "staging" always;

    root /opt/kuberone/apps/admin/dist;
    index index.html;

    location / { try_files $uri $uri/ /index.html; }
    location /api/ {
        proxy_pass http://kuberone_staging_api;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# staging-customer.kuberone.com
server {
    listen 443 ssl http2;
    server_name staging-customer.kuberone.com;
    ssl_certificate     /etc/letsencrypt/live/staging-customer.kuberone.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging-customer.kuberone.com/privkey.pem;
    add_header X-Environment "staging" always;
    location /api/ { proxy_pass http://kuberone_staging_api; }
    location / { return 200 'KuberOne Customer Staging'; add_header Content-Type text/plain; }
}

# staging-partner.kuberone.com
server {
    listen 443 ssl http2;
    server_name staging-partner.kuberone.com;
    ssl_certificate     /etc/letsencrypt/live/staging-partner.kuberone.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging-partner.kuberone.com/privkey.pem;
    add_header X-Environment "staging" always;
    location /api/ { proxy_pass http://kuberone_staging_api; }
    location / { return 200 'KuberOne Partner Staging'; add_header Content-Type text/plain; }
}
