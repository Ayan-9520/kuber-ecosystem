components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token from /auth/login or /auth/verify-otp
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    SortBy:
      name: sortBy
      in: query
      schema:
        type: string
    SortOrder:
      name: sortOrder
      in: query
      schema:
        type: string
        enum:
          - asc
          - desc
        default: desc
    Search:
      name: search
      in: query
      schema:
        type: string
  schemas:
    ApiSuccessResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:

        message:
          type: string
    ApiPaginatedResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:

        meta:
          "$ref": "#/components/schemas/PaginationMeta"
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
    ApiErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
        requestId:
          type: string
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        userType:
          type: string
        roles:
          type: array
          items:
            type: string
        permissions:
          type: array
          items:
            type: string
        dataScope:
          type: string
    Customer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        customerCode:
          type: string
        fullName:
          type: string
        kycStatus:
          type: string
    Partner:
      type: object
      properties:
        id:
          type: string
          format: uuid
        partnerCode:
          type: string
        name:
          type: string
    Lead:
      type: object
      properties:
        id:
          type: string
          format: uuid
        prospectName:
          type: string
        status:
          type: string
        score:
          type: integer
    Application:
      type: object
      properties:
        id:
          type: string
          format: uuid
        applicationCode:
          type: string
        status:
          type: string
        requestedAmount:
          type: number
    Document:
      type: object
      properties:
        id:
          type: string
          format: uuid
        documentCode:
          type: string
        status:
          type: string
        mimeType:
          type: string
    Referral:
      type: object
      properties:
        id:
          type: string
          format: uuid
        referralCode:
          type: string
        status:
          type: string
    Commission:
      type: object
      properties:
        id:
          type: string
          format: uuid
        amount:
          type: number
        status:
          type: string
    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        channel:
          type: string
        title:
          type: string
        body:
          type: string
    Ticket:
      type: object
      properties:
        id:
          type: string
          format: uuid
        ticketNumber:
          type: string
        subject:
          type: string
        status:
          type: string
    Campaign:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
    KnowledgeArticle:
      type: object
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        title:
          type: string
        status:
          type: string
    AiRequest:
      type: object
      properties:
        id:
          type: string
          format: uuid
        module:
          type: string
        status:
          type: string
        modelCode:
          type: string
    AnalyticsResponse:
      type: object
      properties:
        summary:
          type: object
        trends:
          type: array
          items:

    AuditEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        source:
          type: string
        action:
          type: string
        entityType:
          type: string
        integrityHash:
          type: string
        createdAt:
          type: string
          format: date-time
    AuthTokens:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          example: 900
    LoginRequest:
      type: object
      required:
        - loginType
      properties:
        loginType:
          type: string
          enum:
            - employee
            - partner
        email:
          type: string
        password:
          type: string
        phone:
          type: string
    OtpSendRequest:
      type: object
      required:
        - phone
        - purpose
      properties:
        phone:
          type: string
          example: 9876543210
        purpose:
          type: string
          enum:
            - LOGIN
            - CHANGE_MOBILE
    OtpVerifyRequest:
      type: object
      required:
        - phone
        - otp
        - purpose
      properties:
        phone:
          type: string
        otp:
          type: string
          example: 123456
        purpose:
          type: string
    RefreshRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
  responses:
    BadRequest:
      description: Bad Request (400)
      content:
        "application/json":
          schema:
            "$ref": "#/components/schemas/ApiErrorResponse"
          example:
            success: false
            error:
              code: BAD_REQUEST
              message: Invalid request
    Unauthorized:
      description: Unauthorized (401)
      content:
        "application/json":
          schema:
            "$ref": "#/components/schemas/ApiErrorResponse"
          example:
            success: false
            error:
              code: UNAUTHORIZED
              message: Invalid or expired token
    Forbidden:
      description: Forbidden (403)
      content:
        "application/json":
          schema:
            "$ref": "#/components/schemas/ApiErrorResponse"
          example:
            success: false
            error:
              code: FORBIDDEN
              message: Insufficient permissions
    NotFound:
      description: Not Found (404)
      content:
        "application/json":
          schema:
            "$ref": "#/components/schemas/ApiErrorResponse"
          example:
            success: false
            error:
              code: NOT_FOUND
              message: Resource not found
    Conflict:
      description: Conflict (409)
      content:
        "application/json":
          schema:
            "$ref": "#/components/schemas/ApiErrorResponse"
          example:
            success: false
            error:
              code: CONFLICT
              message: Resource already exists
    ValidationError:
      description: Validation Error (422)
      content:
        "application/json":
          schema:
            "$ref": "#/components/schemas/ApiErrorResponse"
          example:
            success: false
            error:
              code: VALIDATION_ERROR
              message: Validation failed
              details:
                phone: Invalid Indian mobile number
    RateLimited:
      description: Too Many Requests (429)
      content:
        "application/json":
          schema:
